services:
  postgres:
    image: postgres:16
    container_name: gestao_equipamentos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestao_equipamentos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # 5433 no host (a 5432 costuma estar ocupada por um Postgres local); 5432 dentro do container.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestao_equipamentos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
